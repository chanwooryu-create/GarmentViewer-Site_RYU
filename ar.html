<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Garment Viewer — AR</title>
	<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
	<style>
		* { box-sizing: border-box; }
		body { margin:0; font-family:"Segoe UI","Malgun Gothic",sans-serif; background:#eef1f5; color:#222; }
		header { background:#1c1f26; color:#fff; padding:14px 22px; display:flex; align-items:center; gap:12px; }
		header h1 { margin:0; font-size:18px; font-weight:600; }
		header a { color:#9cc0ff; font-size:13px; text-decoration:none; margin-left:auto; }
		.wrap { max-width:1100px; margin:0 auto; padding:16px; }
		model-viewer { width:100%; height:70vh; min-height:420px; background:#cfd4da;
		               border-radius:10px; box-shadow:0 4px 18px rgba(0,0,0,.12); }
		.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center; }
		button { background:#2d6cdf; color:#fff; border:0; border-radius:7px; padding:8px 14px; font-size:13px; cursor:pointer; }
		.hint { font-size:12px; color:#667; line-height:1.6; }
		#arbtn { background:#2d6cdf; color:#fff; border:0; border-radius:24px; padding:10px 18px;
		         font-size:14px; position:absolute; bottom:16px; left:50%; transform:translateX(-50%); cursor:pointer; }
	</style>
</head>
<body>
	<header>
		<h1>Garment Viewer — AR</h1>
		<a href="index.html">← 뷰어로</a>
	</header>

	<div class="wrap">
		<model-viewer id="mv"
			camera-controls auto-rotate touch-action="pan-y"
			ar ar-modes="webxr scene-viewer quick-look" ar-scale="auto" ar-placement="floor"
			shadow-intensity="1" exposure="1" environment-image="neutral"
			alt="3D 의복 모델">
			<button slot="ar-button" id="arbtn">AR로 보기</button>
		</model-viewer>

		<div class="toolbar">
			<button onclick="setModel('Hoodie.glb')">Hoodie</button>
			<button onclick="setModel('Jumper.glb')">Jumper</button>
			<button onclick="document.getElementById('f').click()">내 파일 (.glb)</button>
			<input id="f" type="file" accept=".glb,.gltf" style="display:none">
		</div>
		<p class="hint">
			폰에서 이 페이지를 열고 'AR로 보기'를 누르면 카메라로 실제 공간에 옷이 배치됩니다.<br>
			(Android: Chrome / iOS: Safari·Chrome · 데스크톱에서는 3D 미리보기만 표시)
		</p>
	</div>

	<script>
		var mv = document.getElementById('mv');
		function setModel(src) { mv.setAttribute('src', src); }

		var s = new URLSearchParams(location.search).get('src');
		setModel((s && /^[\w .()\-\/]+\.(glb|gltf)$/i.test(s) && !/^https?:/i.test(s)) ? s : 'Hoodie.glb');

		document.getElementById('f').addEventListener('change', function (e) {
			if (e.target.files[0]) setModel(URL.createObjectURL(e.target.files[0]));
		});
		mv.addEventListener('dragover', function (e) { e.preventDefault(); });
		mv.addEventListener('drop', function (e) {
			e.preventDefault();
			if (e.dataTransfer.files[0]) setModel(URL.createObjectURL(e.dataTransfer.files[0]));
		});
	</script>
</body>
</html>
