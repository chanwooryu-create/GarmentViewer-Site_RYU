<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Garment Viewer</title>
	<style>
		:root { --accent:#2d6cdf; --panel:#1c1f26; --bg:#eef1f5; }
		* { box-sizing: border-box; }
		body { margin:0; font-family:"Segoe UI","Malgun Gothic",sans-serif; background:var(--bg); color:#222; }
		header { background:var(--panel); color:#fff; padding:14px 22px; }
		header h1 { margin:0; font-size:18px; font-weight:600; }

		.wrap { display:flex; gap:16px; padding:16px; max-width:1500px; margin:0 auto; align-items:flex-start; }
		.stage { flex:1 1 auto; min-width:0; }
		.sidebar { flex:0 0 260px; display:flex; flex-direction:column; gap:16px; }

		#view { position:relative; width:100%; aspect-ratio:16/9; background:#cfd4da;
		        border-radius:10px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,.12); }
		#view canvas { display:block; width:100% !important; height:100% !important; }
		#view.dragover { outline:3px dashed var(--accent); outline-offset:-6px; }

		.toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center; }
		button { background:var(--accent); color:#fff; border:0; border-radius:7px;
		         padding:8px 14px; font-size:13px; cursor:pointer; }
		button:hover { filter:brightness(1.1); }
		button.ghost { background:#fff; color:#333; border:1px solid #ccd2da; }

		.menu { position:relative; }
		.menu-head::after { content:" ▸"; }
		.menu.open .menu-head::after { content:" ▾"; }
		.menu-body { display:none; position:absolute; top:calc(100% + 6px); left:0; z-index:20;
		             background:#fff; border:1px solid #ccd2da; border-radius:8px; padding:10px;
		             flex-direction:column; gap:8px; min-width:200px; box-shadow:0 6px 20px rgba(0,0,0,.15); }
		.menu.open .menu-body { display:flex; }
		.menu-body button { background:#f4f6f9; color:#333; text-align:left; }
		.menu-body button:hover { background:#e7ecf3; }

		.colorlbl { display:inline-flex; align-items:center; gap:8px; font-size:13px; }
		.colorlbl input[type=color] { width:28px; height:28px; border:0; background:none; cursor:pointer; padding:0; }
		.slider-row { display:flex; align-items:center; gap:8px; font-size:13px; }
		.slider-row span { width:60px; color:#556; }
		.slider-row input[type=range] { flex:1; }
		.slider-row input[type=number] { width:60px; }

		.card { background:#fff; border-radius:10px; padding:14px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
		.card h3 { margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:#667; }
		.thumbs { display:flex; flex-wrap:wrap; gap:8px; }
		.thumbs img { border-radius:6px; cursor:pointer; border:2px solid transparent; transition:border-color .15s, transform .1s; }
		.thumbs img:hover { border-color:var(--accent); transform:scale(1.04); }
		.bg img { width:100%; height:64px; object-fit:cover; }
		.tex img { width:54px; height:54px; object-fit:cover; }

		#progress { display:none; position:absolute; left:0; right:0; bottom:0;
		            background:rgba(20,22,28,.82); color:#fff; padding:12px 16px; }
		#progress-label { font-size:13px; }
		#progress-track { margin-top:8px; height:8px; background:rgba(255,255,255,.2); border-radius:4px; overflow:hidden; }
		#progress-bar { height:100%; width:0; background:var(--accent); transition:width .15s; }

		#toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
		         background:#1c1f26; color:#fff; padding:10px 18px; border-radius:8px;
		         font-size:13px; box-shadow:0 4px 16px rgba(0,0,0,.3); opacity:0;
		         transition:opacity .25s; pointer-events:none; z-index:50; max-width:90vw; word-break:break-all; }

		@media (max-width: 900px) {
			.wrap { flex-direction:column; padding:10px; }
			.sidebar { flex:1 1 auto; width:100%; flex-direction:row; flex-wrap:wrap; }
			.sidebar .card { flex:1 1 200px; }
			#view { aspect-ratio:4/3; }
		}
	</style>
</head>
<body>
	<header><h1>Garment Viewer</h1></header>

	<div class="wrap">
		<div class="stage">
			<div id="view">
				<div id="progress">
					<div id="progress-label">Loading...</div>
					<div id="progress-track"><div id="progress-bar"></div></div>
				</div>
			</div>

			<div class="toolbar">
				<div class="menu">
					<button class="menu-head" onclick="toggleMenu(this)">Garment</button>
					<div class="menu-body">
						<button onclick="selectGarment('hoodie')">Hoodie</button>
						<button onclick="selectGarment('slacks')">Hoodie + Slacks</button>
						<button onclick="selectGarment('jumper')">Jumper</button>
						<button onclick="document.getElementById('userfile').click()">내 파일 (.glb/.fbx/.obj)</button>
						<input id="userfile" type="file" accept=".glb,.gltf,.fbx,.obj,.mtl,image/*" multiple hidden onchange="onPickFile(this)">
					</div>
				</div>

				<div class="menu">
					<button class="menu-head" onclick="toggleMenu(this)">Material</button>
					<div class="menu-body">
						<label class="colorlbl">색상 <input id="colorPick" type="color" value="#ffffff" oninput="SetColor(this.value)"></label>
						<button onclick="ResetColor()">색 초기화</button>
						<button onclick="ClearTexture()">원단 해제</button>
						<div class="slider-row">
							<span>원단 크기</span>
							<input type="range" id="scaleRange" min="0.2" max="8" step="0.1" value="1" oninput="setTexScale(this.value)">
							<input type="number" id="scaleNum" min="0.1" step="0.1" value="1" onchange="setTexScale(this.value)">
						</div>
						<div class="slider-row">
							<span>원단 회전</span>
							<input type="range" id="rotRange" min="0" max="360" step="1" value="0" oninput="setTexRot(this.value)">
							<input type="number" id="rotNum" min="0" max="360" step="1" value="0" onchange="setTexRot(this.value)">
						</div>
					</div>
				</div>

				<button onclick="ShareLink()">공유 링크</button>
				<button onclick="OpenAR()">AR로 보기</button>
				<button onclick="SaveScreenshot()">스크린샷</button>
			</div>
		</div>

		<div class="sidebar">
			<div class="card bg">
				<h3>Background</h3>
				<div class="thumbs">
					<img src="Data/Background/Background 1.jpg" onclick="selectBackground(1)">
					<img src="Data/Background/Background 2.jpg" onclick="selectBackground(2)">
					<img src="Data/Background/Background 3.jpg" onclick="selectBackground(3)">
				</div>
			</div>
			<div class="card tex">
				<h3>Fabric / Texture</h3>
				<div class="thumbs">
					<img src="Data/Texture/Texture (1).jpg" onclick="selectTexture(1)">
					<img src="Data/Texture/Texture (2).jpg" onclick="selectTexture(2)">
					<img src="Data/Texture/Texture (3).jpg" onclick="selectTexture(3)">
					<img src="Data/Texture/Texture (4).jpg" onclick="selectTexture(4)">
					<img src="Data/Texture/Texture (5).jpg" onclick="selectTexture(5)">
				</div>
			</div>
			<div class="card">
				<h3>조작법</h3>
				<div style="font-size:12px; line-height:1.7; color:#556;">
					좌클릭/한 손가락 — 회전<br>
					우클릭/두 손가락 — 이동<br>
					휠/핀치 — 줌 · 더블클릭 — 시점 리셋<br>
					파일을 화면에 끌어다 놓아 불러오기
				</div>
			</div>
		</div>
	</div>

	<script src="three.js"></script>
	<script src="OrbitControls.js"></script>
	<script src="MTLLoader.js"></script>
	<script src="OBJLoader.js"></script>
	<script src="GLTFLoader.js"></script>
	<script src="inflate.min.js"></script>
	<script src="NURBSUtils.js"></script>
	<script src="NURBSCurve.js"></script>
	<script src="FBXLoader.js"></script>
	<script src="main.js"></script>
</body>
</html>
